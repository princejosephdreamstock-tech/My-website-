<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="JuGArNnQnR7vCtQg4Her23qhff86HxiKY5zWywZlAHw" />
    <title>Axiom Forensics | AI Audit & Compliance</title>
    
    <script type="module" crossorigin src="./index-cnhgui-a.js"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script>
      // 1. SURGICAL PRICING FIX: Matches your exact request (€4,500 and €6,500)
      const fixAxiomPricing = () => {
        const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
        let node;
        while(node = walker.nextNode()) {
          let text = node.nodeValue;
          
          // Fix 'Emergency Protocol': Change the current 6,500 to 4,500
          if (text.includes('6,500')) {
             node.nodeValue = text.replace('6,500', '4,500').replace('$', '€').replace('£', '€');
          } 
          // Fix 'Continuous Assurance': Change the current 800 to 6,500
          else if (text.includes('800')) {
             node.nodeValue = text.replace('800', '6,500').replace('$', '€').replace('£', '€');
          }
          // Catch any leftover original values (1,500) and make them 4,500
          else if (text.includes('1,500')) {
             node.nodeValue = text.replace('1,500', '4,500').replace('$', '€').replace('£', '€');
          }
          // Ensure all symbols are Euro
          else if (text.includes('$') || text.includes('£')) {
             node.nodeValue = text.replace('$', '€').replace('£', '€');
          }
        }
      };

      // Runs every 500ms for 5 seconds to stay ahead of React
      const runFix = setInterval(fixAxiomPricing, 500);
      setTimeout(() => clearInterval(runFix), 5000);

      // 2. SAFE ZOHO INTERCEPTION: Captures the form without breaking site links
      document.addEventListener('submit', function (e) {
        const form = e.target;
        if (form.innerHTML.includes('FIRM NAME') || form.innerHTML.includes('Firm Name')) {
          e.preventDefault(); 

          const formData = new FormData(form);
          const zohoData = new URLSearchParams();

          zohoData.append('xnQsjsdp', '8e96272951d944b5fee296aecd1e65b11bce363cc05adf7646b0d402600fe77a');
          zohoData.append('xmIwtLD', 'bc0bfa01c482441021b4fed4066fe0e35fa4962128b024791bfdbc44d4eec91d1e5cef7222489fde0e7ba6628fdea5b5');
          zohoData.append('actionType', 'TGVhZHM=');
          zohoData.append('returnURL', 'https://axiomforensics.cloud');

          zohoData.append('Company', formData.get('firmName') || formData.get('Company') || 'Axiom Lead');
          zohoData.append('Last Name', formData.get('primaryContact') || formData.get('Last Name') || 'Legal Pro');
          zohoData.append('Email', formData.get('firmEmail') || formData.get('Email'));
          zohoData.append('Description', 'Size: ' + (formData.get('firmSize') || 'N/A') + ' | Jurisdiction: ' + (formData.get('jurisdiction') || 'N/A'));

          fetch('https://crm.zoho.com/crm/WebToLeadForm', {
            method: 'POST',
            mode: 'no-cors', 
            body: zohoData
          }).then(() => {
            alert('Axiom Forensics: Assessment Request Received!');
            window.location.reload();
          });
        }
      }, true);
    </script>
  </body>
</html>
