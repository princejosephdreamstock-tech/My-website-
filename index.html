<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="JuGArNnQnR7vCtQg4Her23qhff86HxiKY5zWywZlAHw" />
    <title>Axiom Forensics | AI Audit & Compliance</title>
    
    <script type="module" crossorigin src="./index-cnhgui-a.js"></script>
    
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script>
      // 1. Netlify Identity Logic
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }

      // 2. Zoho CRM "Deep Search" Script
      document.addEventListener('submit', function (e) {
        const form = e.target;
        
        // This looks for your 'Request Assessment' form
        if (form.innerHTML.toLowerCase().includes('firm') || form.innerHTML.toLowerCase().includes('email')) {
          e.preventDefault(); 

          const formData = new FormData(form);
          const zohoData = new URLSearchParams();

          // Your Unique Zoho IDs
          zohoData.append('xnQsjsdp', '8e96272951d944b5fee296aecd1e65b11bce363cc05adf7646b0d402600fe77a');
          zohoData.append('xmIwtLD', 'bc0bfa01c482441021b4fed4066fe0e35fa4962128b024791bfdbc44d4eec91d1e5cef7222489fde0e7ba6628fdea5b5');
          zohoData.append('actionType', 'TGVhZHM=');
          zohoData.append('returnURL', 'https://axiomforensics.cloud');

          // Mapping your site's names to Zoho's names
          const company = formData.get('firmName') || formData.get('Company') || 'Axiom Lead';
          const lastName = formData.get('primaryContact') || formData.get('Last Name') || 'Legal Pro';
          const email = formData.get('firmEmail') || formData.get('Email');

          zohoData.append('Company', company);
          zohoData.append('Last Name', lastName);
          zohoData.append('Email', email);
          zohoData.append('Description', 'Size: ' + (formData.get('firmSize') || 'N/A'));

          fetch('https://crm.zoho.com/crm/WebToLeadForm', {
            method: 'POST',
            mode: 'no-cors', 
            body: zohoData
          }).then(() => {
            alert('Axiom Forensics: Assessment Request Received!');
            window.location.reload();
          });
        }
      });
    </script>
  </body>
</html>
