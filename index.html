<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="JuGArNnQnR7vCtQg4Her23qhff86HxiKY5zWywZlAHw" />
    <title>Axiom Forensics | AI Audit & Compliance</title>
    
    <script type="module" crossorigin src="./index-cnhgui-a.js"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script>
      // 1. SMART PRICE FIX: Changes specific numbers without breaking buttons
      const updateAxiomPricing = () => {
        const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
        let node;
        while(node = walker.nextNode()) {
          let text = node.nodeValue;
          
          // Order is important: Fix the higher price first to avoid double-swapping
          if (text.includes('4,500')) {
            node.nodeValue = text.replace('4,500', '6,500').replace('$', '€').replace('£', '€');
          } else if (text.includes('1,500')) {
            node.nodeValue = text.replace('1,500', '4,500').replace('$', '€').replace('£', '€');
          } else if (text.includes('$') || text.includes('£')) {
            node.nodeValue = text.replace('$', '€').replace('£', '€');
          }
        }
      };

      // Run every second for the first 5 seconds to catch React loading
      const pricingInterval = setInterval(updateAxiomPricing, 1000);
      setTimeout(() => clearInterval(pricingInterval), 5000);

      // 2. TARGETED ZOHO FIX: Only intercepts the form, leaves links alone
      document.addEventListener('submit', function (e) {
        const form = e.target;
        
        // ONLY intercept if the form contains these specific words
        const isAssessmentForm = form.innerHTML.includes('FIRM NAME') || form.innerHTML.includes('Firm Name');
        
        if (isAssessmentForm) {
          e.preventDefault(); 
          console.log("Sending Assessment to Zoho...");

          const formData = new FormData(form);
          const zohoData = new URLSearchParams();

          zohoData.append('xnQsjsdp', '8e96272951d944b5fee296aecd1e65b11bce363cc05adf7646b0d402600fe77a');
          zohoData.append('xmIwtLD', 'bc0bfa01c482441021b4fed4066fe0e35fa4962128b024791bfdbc44d4eec91d1e5cef7222489fde0e7ba6628fdea5b5');
          zohoData.append('actionType', 'TGVhZHM=');
          zohoData.append('returnURL', 'https://axiomforensics.cloud');

          zohoData.append('Company', formData.get('firmName') || formData.get('Company') || 'Axiom Website Lead');
          zohoData.append('Last Name', formData.get('primaryContact') || formData.get('Last Name') || 'Legal Pro');
          zohoData.append('Email', formData.get('firmEmail') || formData.get('Email'));
          zohoData.append('Description', 'Size: ' + formData.get('firmSize') + ' | Jurisdiction: ' + formData.get('jurisdiction'));

          fetch('https://crm.zoho.com/crm/WebToLeadForm', {
            method: 'POST',
            mode: 'no-cors', 
            body: zohoData
          }).then(() => {
            alert('Axiom Forensics: Assessment Request Received!');
            window.location.reload();
          });
        }
      }, true);
    </script>
  </body>
</html>
