<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="JuGArNnQnR7vCtQg4Her23qhff86HxiKY5zWywZlAHw" />
    <title>Axiom Forensics | AI Audit & Compliance</title>
    
    <script type="module" crossorigin src="./index-cnhgui-a.js"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script>
      // 1. THE SAFE PRICE FIX: Changes text nodes only, so links stay active
      const safePriceFix = () => {
        const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
        let node;
        while(node = walker.nextNode()) {
          if (node.nodeValue.includes('$800')) node.nodeValue = node.nodeValue.replace('$800', '£4,700');
          else if (node.nodeValue.includes('$1,000')) node.nodeValue = node.nodeValue.replace('$1,000', '£6,500');
          else if (node.nodeValue.includes('$')) node.nodeValue = node.nodeValue.replace('$', '£');
        }
      };
      
      // Run once, then again after 2 seconds to catch React updates
      setTimeout(safePriceFix, 1000);
      setTimeout(safePriceFix, 3000);

      // 2. THE ZOHO FIX: Connects the form safely
      document.addEventListener('submit', function (e) {
        const form = e.target;
        // Only run if it's the assessment form
        if (form.innerHTML.includes('FIRM NAME') || form.innerHTML.includes('Firm Name')) {
          e.preventDefault(); 

          const formData = new FormData(form);
          const zohoData = new URLSearchParams();

          zohoData.append('xnQsjsdp', '8e96272951d944b5fee296aecd1e65b11bce363cc05adf7646b0d402600fe77a');
          zohoData.append('xmIwtLD', 'bc0bfa01c482441021b4fed4066fe0e35fa4962128b024791bfdbc44d4eec91d1e5cef7222489fde0e7ba6628fdea5b5');
          zohoData.append('actionType', 'TGVhZHM=');
          zohoData.append('returnURL', 'https://axiomforensics.cloud');

          zohoData.append('Company', formData.get('firmName') || formData.get('Company') || 'Axiom Website Lead');
          zohoData.append('Last Name', formData.get('primaryContact') || formData.get('Last Name') || 'Legal Pro');
          zohoData.append('Email', formData.get('firmEmail') || formData.get('Email'));
          zohoData.append('Description', 'Size: ' + formData.get('firmSize') + ' | Jurisdiction: ' + formData.get('jurisdiction'));

          fetch('https://crm.zoho.com/crm/WebToLeadForm', {
            method: 'POST',
            mode: 'no-cors', 
            body: zohoData
          }).then(() => {
            alert('Axiom Forensics: Assessment Request Received!');
            window.location.reload();
          });
        }
      }, true);
    </script>
  </body>
</html>
