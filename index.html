<script>
  document.addEventListener('submit', function (e) {
    const form = e.target;
    
    // 1. Identify the form (Looking for any form with an email or company field)
    if (form.innerHTML.toLowerCase().includes('firm') || form.innerHTML.toLowerCase().includes('email')) {
      e.preventDefault(); 
      console.log("Axiom Form Detected. Starting Zoho Transfer...");

      const formData = new FormData(form);
      const zohoData = new URLSearchParams();

      // Your Unique Zoho IDs
      zohoData.append('xnQsjsdp', '8e96272951d944b5fee296aecd1e65b11bce363cc05adf7646b0d402600fe77a');
      zohoData.append('xmIwtLD', 'bc0bfa01c482441021b4fed4066fe0e35fa4962128b024791bfdbc44d4eec91d1e5cef7222489fde0e7ba6628fdea5b5');
      zohoData.append('actionType', 'TGVhZHM=');
      zohoData.append('returnURL', 'https://axiomforensics.cloud');

      // 2. SMART MAPPING (Tries multiple possible names used in React)
      const company = formData.get('firmName') || formData.get('Company') || formData.get('firm_name') || 'Axiom Website Lead';
      const lastName = formData.get('primaryContact') || formData.get('Last Name') || formData.get('contact_name') || 'Legal Professional';
      const email = formData.get('firmEmail') || formData.get('Email') || formData.get('email');
      const description = 'Firm Size: ' + (formData.get('firmSize') || 'N/A') + ' | Jurisdiction: ' + (formData.get('jurisdiction') || 'N/A');

      zohoData.append('Company', company);
      zohoData.append('Last Name', lastName);
      zohoData.append('Email', email);
      zohoData.append('Description', description);

      console.log("Sending data to Zoho:", Object.fromEntries(zohoData));

      // 3. Send to Zoho
      fetch('https://crm.zoho.com/crm/WebToLeadForm', {
        method: 'POST',
        mode: 'no-cors', 
        body: zohoData
      }).then(() => {
        alert('Axiom Forensics: Assessment Request Received!');
        window.location.reload();
      }).catch(err => {
        console.error("Zoho Error:", err);
      });
    }
  });
</script>
